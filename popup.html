<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>PNJ GeoGuessr Tools</title>
    <style>
      :root {
        --gg-font: "GeoGuessr", "Neo Sans Std", "Nunito Sans", "Arial Rounded MT Bold", system-ui, sans-serif;
        --dark: #2c0d67;
        --card: #5225a8;
        --card-deep: #35106f;
        --outline: #7551c8;
        --button-top: #b999ff;
        --button-bottom: #6d3ad6;
        --text: #ffffff;
        --muted: #c7b5ff;
      }

      * {
        box-sizing: border-box;
      }

      html {
        height: 100%;
      }

      body {
        width: 100%;
        height: 100vh;
        margin: 0;
        padding: 8px 12px;
        overflow: hidden;
        background:
          radial-gradient(circle at 16% 12%, rgba(255, 255, 255, .85) 0 1px, transparent 2px),
          radial-gradient(circle at 86% 18%, rgba(255, 255, 255, .7) 0 1px, transparent 2px),
          radial-gradient(circle at 72% 72%, rgba(255, 255, 255, .55) 0 1px, transparent 2px),
          linear-gradient(180deg, #5b28b4 0%, var(--dark) 100%);
        color: var(--text);
        font: 800 14px/1.25 var(--gg-font);
      }

      ::-webkit-scrollbar {
        width: 10px;
      }

      ::-webkit-scrollbar-track {
        background: #2c0d67;
      }

      ::-webkit-scrollbar-thumb {
        border: 2px solid #2c0d67;
        border-radius: 999px;
        background: linear-gradient(180deg, #b999ff, #6d3ad6);
      }

      .panel {
        overflow: hidden;
        height: 100%;
        width: min(100%, 430px);
        margin: 0 auto;
        border: 3px solid #7551c8;
        border-radius: 22px;
        background: var(--card);
        box-shadow:
          inset 0 0 0 2px var(--outline),
          0 12px 26px rgba(34, 9, 85, .45);
      }

      .content {
        display: flex;
        flex-direction: column;
        height: 100%;
        min-height: 0;
        padding: 20px clamp(18px, 5vw, 28px) 0;
        background: linear-gradient(180deg, #5b28b4 0%, var(--card-deep) 100%);
      }

      #brand {
        margin: 0 0 18px;
        color: #fff;
        font-size: clamp(22px, 6vw, 28px);
        font-style: italic;
        font-weight: 950;
        letter-spacing: 0;
        text-align: center;
        text-shadow: 0 3px 0 rgba(25, 8, 85, .65);
      }

      button {
        width: 100%;
        min-height: 52px;
        margin: 0 0 12px;
        padding: 0 16px;
        border: 0;
        border-radius: 999px;
        background: linear-gradient(180deg, var(--button-top) 0%, var(--button-bottom) 100%);
        box-shadow:
          inset 0 2px 0 rgba(255, 255, 255, .35),
          0 5px 0 #321071,
          0 12px 18px rgba(17, 5, 47, .38);
        color: #fff;
        cursor: pointer;
        font: 950 14px/1 var(--gg-font);
        letter-spacing: 0;
        text-transform: uppercase;
        text-shadow: 0 2px 0 rgba(30, 8, 92, .55);
      }

      button:hover {
        filter: brightness(1.08);
      }

      .range-card {
        margin: 0 0 16px;
        padding: 14px 16px 16px;
        border: 2px solid rgba(255, 255, 255, .18);
        border-radius: 16px;
        background: rgba(24, 6, 68, .42);
        box-shadow: inset 0 2px 0 rgba(255, 255, 255, .08);
      }

      .range-title {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 10px;
        color: #fff;
        font-size: 12px;
        text-shadow: 0 2px 0 rgba(30, 8, 92, .55);
        text-transform: uppercase;
      }

      .range-slider {
        --range-left: 90%;
        --range-right: 98%;
        position: relative;
        height: 34px;
        margin: 8px 0 14px;
        cursor: pointer;
      }

      .range-slider::before,
      .range-slider::after {
        content: "";
        position: absolute;
        top: 13px;
        height: 8px;
        border-radius: 999px;
      }

      .range-slider::before {
        inset-inline: 0;
        background: rgba(255, 255, 255, .28);
      }

      .range-slider::after {
        left: var(--range-left);
        right: calc(100% - var(--range-right));
        background: #ff416d;
      }

      .range-slider input[type="range"] {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 34px;
        margin: 0;
        appearance: none;
        background: transparent;
        pointer-events: none;
      }

      .range-slider input[type="range"]::-webkit-slider-runnable-track {
        height: 8px;
        background: transparent;
      }

      .range-slider input[type="range"]::-webkit-slider-thumb {
        width: 20px;
        height: 20px;
        margin-top: -6px;
        border: 0;
        border-radius: 50%;
        appearance: none;
        background: #ff416d;
        box-shadow: 0 2px 0 rgba(58, 11, 111, .65);
        pointer-events: none;
      }

      .map-card {
        flex: 1 1 auto;
        min-height: 0;
        overflow: hidden;
        margin: 0;
        border: 2px solid rgba(255, 255, 255, .18);
        border-radius: 16px;
        background: rgba(24, 6, 68, .42);
        box-shadow: inset 0 2px 0 rgba(255, 255, 255, .08);
      }

      .map-card iframe {
        width: 100%;
        height: calc(100% + 44px);
        border: 0;
        display: block;
      }

      [hidden] {
        display: none !important;
      }

      #status {
        min-height: 0;
        color: #ffe1ff;
        font-size: 11px;
        text-align: center;
      }

      @media (max-width: 360px) {
        body {
          padding-inline: 8px;
        }

        .content {
          padding-inline: 16px;
        }

        button {
          min-height: 48px;
          font-size: 13px;
        }
      }
    </style>
  </head>
  <body>
    <div class="panel">
      <div class="content">
        <div id="brand">PNJ GeoGuessr Tools</div>
        <button data-place="exact">Place exact</button>
        <div id="nearby-panel" class="range-card">
          <div class="range-title">
            <span>Score range</span>
            <span id="nearby-value">4500-4900</span>
          </div>
          <div id="nearby-slider" class="range-slider">
            <input id="nearby-min" type="range" min="0" max="5000" step="50" value="4500" aria-label="Minimum score">
            <input id="nearby-max" type="range" min="0" max="5000" step="50" value="4900" aria-label="Maximum score">
          </div>
          <button data-place="nearby">Place range</button>
        </div>
        <button data-map-toggle>Refresh map</button>
        <div id="map-panel" class="map-card">
          <iframe id="map-frame" title="Round map" loading="lazy"></iframe>
        </div>
        <div id="status"></div>
      </div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
